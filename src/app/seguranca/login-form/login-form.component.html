<div class="login-wrapper">
  <div class="login-card">

    <div class="login-brand">
      <div class="login-brand__icon">
        <i class="pi pi-dollar"></i>
      </div>
      <h1 class="login-brand__name">AlgaMoney</h1>
      <p class="login-brand__subtitle">Sistema de gestão financeira</p>
    </div>

    <form autocomplete="off" #f="ngForm" class="login-form">
      <div class="login-form__field">
        <label>E-mail</label>
        <input pInputText type="email" name="usuario" placeholder="seu@email.com"
               ngModel required #usuario class="login-input">
      </div>

      <div class="login-form__field">
        <label>Senha</label>
        <input pInputText type="password" name="senha" placeholder="••••••••"
               ngModel required #senha class="login-input">
      </div>

      <button pButton type="submit" label="Entrar" icon="pi pi-sign-in"
              [disabled]="!f.valid" class="login-btn"
              (click)="login(usuario.value, senha.value); senha.value = ''; usuario.value = '';">
      </button>
    </form>

  </div>
</div>
